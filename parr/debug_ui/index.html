        html += `<div class="mt-8"><span class="tag tag-error">error</span> <span class="text-sm">${esc(tc.error)}</span></div>`;
      }
      html += `</div>`;
    }
  } else {
    // No data at all - show minimal
    if (tc.error) {
      html += `<div><span class="tag tag-error">error</span> <span class="text-sm">${esc(tc.error)}</span></div>`;
    } else {
      html += `<span class="text-xs text-muted">No detailed input/output recorded.</span>`;
    }
  }

  html += `</div></details>`;
  return html;
}

function isFrameworkTool(name) {
  const fwTools = [
    'create_todo_list', 'update_todo_list', 'get_todo_list',
    'mark_todo_complete', 'batch_mark_todo_complete',
    'log_finding', 'batch_log_findings', 'get_findings',
    'review_checklist', 'get_review_summary',
    'submit_report', 'spawn_agent', 'wait_for_agents', 'get_agent_results',
  ];
  return fwTools.includes(name);
}

/* ================================================================== */
/* Memory Renderer                                                     */
/* ================================================================== */
function renderMemory(mem, tid) {
  let html = '';
  for (const [key, val] of Object.entries(mem)) {
    if (val === null || val === undefined) continue;
    const label = key.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
    const count = Array.isArray(val) ? ` (${val.length})` : '';

    html += `<details class="collapse mb-8" data-cid="mem-${tid}-${key}">
      <summary><span class="text-sm">${esc(label)}${count}</span></summary>
      <div class="collapse-body">`;

    if (key === 'todo_list' && Array.isArray(val)) {
      html += renderTodoList(val);
    } else if (key === 'findings' && Array.isArray(val)) {
      html += renderFindings(val);
    } else if (key === 'review' && Array.isArray(val)) {
      html += renderReview(val);
    } else {
      html += `<div class="json-block">${esc(formatJson(val))}</div>`;
    }

    html += `</div></details>`;
  }
  return html;
}

function renderTodoList(items) {
  if (!items.length) return '<span class="text-muted">Empty</span>';
  let html = '<div style="display:flex;flex-direction:column;gap:4px">';
  for (const t of items) {
    const done = t.completed;
    const icon = done ? '&#10003;' : '&#9675;';
    const style = done ? 'color:var(--green)' : 'color:var(--text-dim)';
    html += `<div class="flex items-center gap-6">
      <span style="${style};font-weight:600;width:14px">${icon}</span>
      <span class="${done ? 'text-dim' : ''}">${esc(t.description || '')}</span>
      ${t.completion_summary ? `<span class="text-xs text-muted">- ${esc(t.completion_summary)}</span>` : ''}
    </div>`;
  }
  html += '</div>';
  return html;
}

function renderFindings(items) {
  if (!items.length) return '<span class="text-muted">Empty</span>';
  let html = '';
  for (const f of items) {
    html += `<div style="margin-bottom:8px;padding:8px;background:var(--bg-input);border-radius:var(--radius-sm);border-left:3px solid var(--accent-dim)">
      <div class="flex items-center gap-6 mb-8">
        <span class="tag tag-tool">${esc(f.category || 'general')}</span>
        ${f.confidence ? `<span class="text-xs text-muted">${esc(f.confidence)}</span>` : ''}
      </div>
      <div class="text-sm">${esc(f.content || '')}</div>
      ${f.source ? `<div class="text-xs text-muted mt-8">Source: ${esc(f.source)}</div>` : ''}
    </div>`;
  }
  return html;
}

function renderReview(items) {
  if (!items.length) return '<span class="text-muted">Empty</span>';
  let html = '';
  for (const r of items) {
    const ratingClass = r.rating === 'pass' ? 'tag-ok' : (r.rating === 'fail' ? 'tag-fail' : 'tag-warn');
    html += `<div style="margin-bottom:6px" class="flex items-center gap-6">
      <span class="tag ${ratingClass}">${esc(r.rating || '?')}</span>
      <span class="text-sm">${esc(r.criterion || '')}</span>
      ${r.justification ? `<span class="text-xs text-muted">- ${esc(r.justification)}</span>` : ''}
    </div>`;
  }
  return html;
}

function renderStructuredReport(report) {
  if (!report || typeof report !== 'object') {
    return `<div class="json-block">${esc(formatJson(report))}</div>`;
  }

  let html = '';
  if (report.answer) {
    html += `<div class="mb-8"><strong class="text-xs text-muted">Answer</strong>`;
    html += `<div class="agent-task">${renderMarkdown(String(report.answer))}</div></div>`;
  }

  if (report.summary) {
    html += `<div class="mb-8"><strong class="text-xs text-muted">Summary</strong>`;
    html += `<div class="agent-task">${esc(report.summary)}</div></div>`;
  }

  if (Array.isArray(report.key_findings) && report.key_findings.length) {
    html += '<div class="mb-8"><strong class="text-xs text-muted">Key Findings</strong>';
    html += '<ol style="padding-left:18px;margin-top:6px">';
    for (const item of report.key_findings) {
      if (!item) continue;
      const finding = item.finding || item.detail || item.content || formatJson(item);
      const source = item.source ? `<div class="text-xs text-muted mt-8">Source: ${esc(item.source)}</div>` : '';
      const evidence = item.evidence ? `<div class="text-xs text-muted mt-8">Evidence: ${esc(item.evidence)}</div>` : '';
      const confidence = item.confidence ? `<div class="text-xs text-muted mt-8">Confidence: ${esc(item.confidence)}</div>` : '';
      html += `<li class="text-sm mb-8">${esc(finding)}${source}${evidence}${confidence}</li>`;
    }
    html += '</ol></div>';
  }

  if (Array.isArray(report.evidence) && report.evidence.length) {
    html += '<div class="mb-8"><strong class="text-xs text-muted">Evidence</strong>';
    html += '<ul style="padding-left:16px;margin-top:6px">';
    for (const item of report.evidence) {
      if (!item) continue;
      if (typeof item === 'string') {
        html += `<li class="text-sm mb-8">${esc(item)}</li>`;
        continue;
      }
      const detail = item.detail || item.content || item.finding || formatJson(item);
      const source = item.source ? `<div class="text-xs text-muted mt-8">Source: ${esc(item.source)}</div>` : '';
      const url = item.url ? `<div class="text-xs text-muted mt-8">URL: ${esc(item.url)}</div>` : '';
      const quote = item.quote ? `<div class="text-xs text-muted mt-8">Quote: ${esc(item.quote)}</div>` : '';
      const confidence = item.confidence ? `<div class="text-xs text-muted mt-8">Confidence: ${esc(item.confidence)}</div>` : '';
      html += `<li class="text-sm mb-8">${esc(detail)}${source}${url}${quote}${confidence}</li>`;
    }
    html += '</ul></div>';
  }

  if (Array.isArray(report.sources) && report.sources.length) {
    html += '<div class="mb-8"><strong class="text-xs text-muted">Sources</strong>';
    html += '<ul style="padding-left:16px;margin-top:6px">';
    for (const src of report.sources) {
      if (!src) continue;
      if (typeof src === 'string') {
        html += `<li class="text-sm mb-8">${esc(src)}</li>`;
        continue;
      }
      const title = src.title || src.source || 'source';
      const publisher = src.publisher ? ` (${esc(src.publisher)})` : '';
      const url = src.url ? ` - ${esc(src.url)}` : '';
      html += `<li class="text-sm mb-8">${esc(title)}${publisher}${url}</li>`;
    }
    html += '</ul></div>';
  }

  if (Array.isArray(report.gaps) && report.gaps.length) {
    html += '<div class="mb-8"><strong class="text-xs text-muted">Gaps</strong><ul style="padding-left:16px;margin-top:6px">';
    html += report.gaps.map(g => `<li class="text-sm mb-8">${esc(g)}</li>`).join('');
    html += '</ul></div>';
  }

  if (Array.isArray(report.recommendations) && report.recommendations.length) {
    html += '<div class="mb-8"><strong class="text-xs text-muted">Recommendations</strong><ul style="padding-left:16px;margin-top:6px">';
    html += report.recommendations.map(r => `<li class="text-sm mb-8">${esc(r)}</li>`).join('');
    html += '</ul></div>';
  }

  if (report.confidence !== undefined && report.confidence !== null && report.confidence !== '') {
    html += `<div class="mb-8"><strong class="text-xs text-muted">Confidence</strong>`;
    html += `<div class="text-sm">${esc(String(report.confidence))}</div></div>`;
  }

  // Fallback: if schema differs, still expose all fields.
  if (!html) {
    html = `<div class="json-block">${esc(formatJson(report))}</div>`;
  }
  return html;
}

/* ================================================================== */
/* Output Renderer                                                     */
/* ================================================================== */
function renderOutput(output, tid) {
  const status = output.status || 'unknown';
  const tokens = output.token_usage || {};
  const meta = output.execution_metadata || {};
  const findings = (output.findings && typeof output.findings === 'object') ? output.findings : null;
  const findingsSummary = findings && findings.summary ? String(findings.summary) : '';

  let html = `<div class="mb-12"><span class="badge badge-${status}">${status}</span></div>`;

  if (output.summary && String(output.summary) !== findingsSummary) {
    html += `<div class="mb-8"><strong class="text-xs text-muted">Summary</strong>
      <div class="agent-task">${esc(output.summary)}</div></div>`;
  }

  if (tokens.input_tokens || tokens.output_tokens) {
    html += `<div class="kv-grid mb-8">
      <span class="kv-key">Input tokens</span><span>${fmtNum(tokens.input_tokens || 0)}</span>
      <span class="kv-key">Output tokens</span><span>${fmtNum(tokens.output_tokens || 0)}</span>
      <span class="kv-key">Total tokens</span><span>${fmtNum(tokens.total_tokens || 0)}</span>
      ${tokens.total_cost ? `<span class="kv-key">Cost</span><span>$${tokens.total_cost.toFixed(4)}</span>` : ''}
    </div>`;
  }

  if (meta.phases_completed && meta.phases_completed.length) {
    html += `<div class="mb-8"><span class="text-xs text-muted">Phases: </span>
      ${meta.phases_completed.map(p => `<span class="tag tag-phase">${esc(p)}</span>`).join(' ')}
    </div>`;
  }

  if (meta.execution_path) {
    const pathLabel = meta.execution_path === 'direct_answer' ? 'direct answer' : 'full workflow';
    html += `<div class="mb-8"><span class="text-xs text-muted">Execution Path: </span>
      <span class="tag tag-phase">${esc(pathLabel)}</span>
    </div>`;
  }

  if (meta.routing_decision && typeof meta.routing_decision === 'object') {
    const rd = meta.routing_decision;
    const confidence = Number.isFinite(Number(rd.confidence))
      ? Number(rd.confidence).toFixed(2)
      : 'n/a';
    html += `<details class="collapse mt-8" data-cid="out-route-${tid}">
      <summary><span class="text-sm">Routing Decision</span></summary>
      <div class="collapse-body"><div class="kv-grid">
        <span class="kv-key">Selected path</span><span>${esc(String(rd.selected_path || 'n/a'))}</span>
        <span class="kv-key">Mode</span><span>${esc(String(rd.mode || 'n/a'))}</span>
        <span class="kv-key">Confidence</span><span>${esc(confidence)}</span>
        <span class="kv-key">Policy reason</span><span>${esc(String(rd.policy_reason || ''))}</span>
        <span class="kv-key">Reason</span><span>${esc(String(rd.reason || ''))}</span>
      </div></div>
    </details>`;
  }

  if (meta.sub_agents_spawned && meta.sub_agents_spawned.length) {
    html += `<div class="mb-8"><span class="text-xs text-muted">Sub-agents: </span>
      ${meta.sub_agents_spawned.map(s => `<span class="tag tag-spawn">${esc(s.substring(0,8))}</span>`).join(' ')}
    </div>`;
  }

  if (findings && Object.keys(findings).length) {
    html += `<div class="mb-8"><strong class="text-xs text-muted">Submitted Report</strong>`;
    html += renderStructuredReport(findings);
    html += `</div>`;
    html += `<details class="collapse mt-8" data-cid="out-f-${tid}">
      <summary><span class="text-sm">Raw Report JSON</span></summary>
      <div class="collapse-body"><div class="json-block">${esc(formatJson(findings))}</div></div>
    </details>`;
  }

  if (output.errors && output.errors.length) {
    html += `<details class="collapse mt-8" data-cid="out-e-${tid}">
      <summary><span class="tag tag-error">errors</span> Errors (${output.errors.length})</summary>
      <div class="collapse-body">`;
    for (const e of output.errors) {
      html += `<div style="margin-bottom:6px">
        <span class="tag tag-error">${esc(e.error_type || e.source || 'error')}</span>
        <span class="text-sm">${esc(e.message || '')}</span>
      </div>`;
    }
    html += `</div></details>`;
  }

  if (output.recommendations && output.recommendations.length) {
    html += `<details class="collapse mt-8" data-cid="out-r-${tid}">
      <summary><span class="text-sm">Recommendations (${output.recommendations.length})</span></summary>
      <div class="collapse-body"><ul style="padding-left:16px">
        ${output.recommendations.map(r => `<li class="text-sm mb-8">${esc(r)}</li>`).join('')}
      </ul></div>
    </details>`;
  }

  if (meta.phase_outputs && Object.keys(meta.phase_outputs).length) {
    html += `<details class="collapse mt-8" data-cid="out-p-${tid}">
      <summary><span class="text-sm">Phase Outputs</span></summary>
      <div class="collapse-body">`;
    for (const [phase, text] of Object.entries(meta.phase_outputs)) {
      html += `<details class="collapse mb-8" data-cid="out-p-${tid}-${phase}">
        <summary><span class="tag tag-phase">${esc(phase)}</span></summary>
        <div class="collapse-body"><div class="json-block">${esc(text)}</div></div>
      </details>`;
    }
    html += `</div></details>`;
  }

  return html;
}

/* ================================================================== */
/* Start Form                                                          */
/* ================================================================== */
function showStartForm() {
  document.getElementById('welcome').style.display = 'none';
  document.getElementById('session-detail').style.display = 'none';
  document.getElementById('start-form').style.display = 'block';
  document.getElementById('sf-task').focus();
}

function hideStartForm() {
  document.getElementById('start-form').style.display = 'none';
  if (currentSessionId) {
    document.getElementById('session-detail').style.display = 'block';
  } else {
    document.getElementById('welcome').style.display = 'flex';
  }
}

async function submitStartForm() {
  if (!config.can_start) return;
  const task = document.getElementById('sf-task').value.trim();
  const role = document.getElementById('sf-role').value;
  if (!task || !role) { alert('Task and role are required.'); return; }

  const btn = document.getElementById('sf-submit');
  btn.disabled = true;
  btn.textContent = 'Starting...';

  try {
    const resp = await api('/api/sessions', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ task, role }),
    });
    if (resp.error) { alert('Error: ' + resp.error); return; }
    document.getElementById('sf-task').value = '';
    hideStartForm();
    autoSelectNewest = true;
    await loadSessions();
    if (autoSelectNewest) {
      setTimeout(async () => { await loadSessions(); }, 1000);
      setTimeout(async () => { autoSelectNewest = false; await loadSessions(); }, 2500);
    }
  } catch (e) {
    alert('Failed to start workflow: ' + e.message);
  } finally {
    btn.disabled = false;
    btn.textContent = 'Start Workflow';
  }
}

/* ================================================================== */
/* Helpers                                                             */
/* ================================================================== */
function esc(str) {
  if (str === null || str === undefined) return '';
  const d = document.createElement('div');
  d.textContent = String(str);
  return d.innerHTML;
}

function formatJson(obj) {
  try { return JSON.stringify(obj, null, 2); }
  catch { return String(obj); }
}

function fmtNum(n) { return Number(n).toLocaleString(); }

function fmtTime(iso) {
  try { return new Date(iso).toLocaleString(); }
  catch { return iso; }
}

function fmtDuration(ms) {
  if (!ms) return '0s';
  if (ms < 1000) return `${ms}ms`;
  const s = Math.floor(ms / 1000);
  if (s < 60) return `${s}s`;
  const m = Math.floor(s / 60);
  return `${m}m ${s % 60}s`;
}

/* ================================================================== */
/* Boot                                                                */
/* ================================================================== */
init();
</script>
