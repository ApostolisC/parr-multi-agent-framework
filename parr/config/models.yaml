# =============================================================================
# Model Pricing Catalog
# =============================================================================
# Defines all LLM models available to agents, with token pricing and context
# window sizes. Roles reference these by name in roles.yaml.
#
# Pricing is per 1,000 tokens. Update when provider pricing changes.
# =============================================================================

models:
  gpt-4o:
    input_price_per_1k: 0.005
    output_price_per_1k: 0.015
    context_window: 128000

  gpt-4o-mini:
    input_price_per_1k: 0.00015
    output_price_per_1k: 0.0006
    context_window: 128000

  claude-3-5-sonnet:
    input_price_per_1k: 0.003
    output_price_per_1k: 0.015
    context_window: 200000

  claude-3-haiku:
    input_price_per_1k: 0.00025
    output_price_per_1k: 0.00125
    context_window: 200000
