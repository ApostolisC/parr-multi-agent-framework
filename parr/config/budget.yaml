# =============================================================================
# Budget Defaults & Phase Iteration Limits
# =============================================================================
# Global defaults for all workflows. Can be overridden per-workflow via
# the budget parameter in start_workflow().
# =============================================================================

budget_defaults:
  max_tokens: 200000        # Total token ceiling per workflow
  max_cost: 10.0            # Dollar ceiling per workflow
  max_duration_ms: 300000   # 5-minute wall-clock timeout
  max_agent_depth: 3        # Max nesting depth for spawned agents
  max_parallel_agents: 3    # Max concurrent child agents
  max_sub_agents_total: 10  # Max total children a single agent can spawn
  inherit_remaining: true   # Children inherit parent's remaining budget
  child_budget_fraction: 0.5          # Fraction of remaining budget given to each child agent
  parent_recovery_budget_pct: 0.10    # Fraction of budget reserved for parent after child failures
  max_child_review_cycles: ~          # Max review cycles for child agents (null = use parent's)
  context_soft_compaction_pct: 0.40   # Trigger soft compaction at this % of context window
  context_hard_truncation_pct: 0.65   # Trigger hard truncation at this % of context window

# Iteration limits per phase. Each iteration = one LLM call (any tool call).
# Both domain and framework tool calls count toward these limits.
phase_limits:
  plan: 5
  act: 15
  review: 5
  report: 5

# Optional global queue/rate limits for LLM calls.
llm_rate_limit:
  enabled: true
  max_concurrent_requests: 100
  max_tokens_per_minute: 100000
  max_requests_per_minute: 1500
  max_queue_size: 100
  acquire_timeout_seconds: 30

simple_query_bypass:
  enabled: true
  route_confidence_threshold: 0.80
  force_full_workflow_if_output_schema: true
  allow_escalation_to_full_workflow: true
  direct_answer_max_tokens: 512

# Stall detection thresholds. These control when the framework intervenes
# to prevent the agent from looping. Advisory warnings are issued before
# force-completion to give the LLM a chance to self-correct.
# stall_detection:
max_consecutive_tool_failures: 3   # Disable tool after N consecutive failures
max_framework_stall_iterations: 5  # Force-complete after N read-only stall iterations
max_fw_only_consecutive_iterations: 10  # Force-complete after N framework-only iterations
max_duplicate_call_iterations: 4   # Force-complete after N duplicate-call iterations
duplicate_call_window: 8           # Window of recent iterations to check for duplicates
